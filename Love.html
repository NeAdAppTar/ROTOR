
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>I LOVE YOU</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      overflow: hidden;
      background: #050505;
      color: white;
      font-family: 'Fira Code', monospace;
      height: 100vh;
      width: 100vw;
    }

    .screen {
      position: relative;
      width: 100%;
      height: 100vh;
      overflow: hidden;
    }

    .center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .console {
      width: min(700px, 90vw);
      color: rgba(255,255,255,0.85);
      z-index: 5;
      transition: opacity 1s ease;
    }

    .line {
      display: flex;
      gap: 12px;
      margin-bottom: 14px;
      font-size: 15px;
    }

    .pink {
      color: #ff8fb1;
    }

    .green {
      color: #4ade80;
    }

    .muted {
      color: rgba(255,255,255,0.25);
      font-size: 12px;
    }

    .button {
      margin-top: 40px;
      display: inline-flex;
      align-items: center;
      gap: 14px;
      padding: 14px 22px;
      border: 1px solid rgba(255,77,109,0.3);
      background: rgba(255,77,109,0.05);
      color: #ff8fb1;
      cursor: pointer;
      transition: 0.3s ease;
      text-transform: uppercase;
      letter-spacing: 3px;
      font-size: 12px;
      position: relative;
      overflow: hidden;
    }

    .button:hover {
      background: rgba(255,77,109,0.12);
      transform: translateY(-2px);
      box-shadow: 0 0 30px rgba(255,77,109,0.2);
    }

    .cursor {
      width: 10px;
      height: 16px;
      border-right: 2px solid #ff4d6d;
      animation: blink 1s infinite;
    }

    @keyframes blink {
      50% {
        opacity: 0;
      }
    }

    .scanline {
      position: absolute;
      width: 100%;
      height: 120px;
      background: linear-gradient(
        to bottom,
        transparent,
        rgba(255,255,255,0.03),
        transparent
      );
      animation: scanline 8s linear infinite;
      pointer-events: none;
      z-index: 20;
    }

    @keyframes scanline {
      from {
        transform: translateY(-120px);
      }
      to {
        transform: translateY(110vh);
      }
    }

    canvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
    }

    .reveal {
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }

    .reveal.active {
      opacity: 1;
      pointer-events: auto;
    }

    .title {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      z-index: 10;
      text-align: center;
      animation: fadeIn 3s ease forwards;
      opacity: 0;
      animation-delay: 2.5s;
    }

    .title h1 {
      color: #ff4d6d;
      letter-spacing: 10px;
      text-transform: uppercase;
      margin-bottom: 16px;
      text-shadow:
        0 0 10px rgba(255,77,109,0.5),
        0 0 20px rgba(255,77,109,0.2);
    }

    .line-small {
      width: 60px;
      height: 1px;
      background: rgba(255,77,109,0.3);
      margin: auto;
      margin-bottom: 25px;
    }

    .rebtn {
      background: transparent;
      border: none;
      color: rgba(255,255,255,0.35);
      font-family: inherit;
      letter-spacing: 3px;
      text-transform: uppercase;
      cursor: pointer;
      transition: 0.3s ease;
      font-size: 11px;
    }

    .rebtn:hover {
      color: rgba(255,255,255,0.8);
    }

    @keyframes fadeIn {
      to {
        opacity: 1;
      }
    }

    .hud {
      position: absolute;
      font-size: 10px;
      color: rgba(255,255,255,0.12);
      letter-spacing: 2px;
      text-transform: uppercase;
      z-index: 11;
      line-height: 1.8;
    }

    .hud.left {
      top: 30px;
      left: 30px;
    }

    .hud.right {
      bottom: 30px;
      right: 30px;
    }

  </style>
</head>
<body>

<div class="screen">

  <div class="scanline"></div>

  <div class="console center" id="console">

    <div class="line">
      <span class="pink">[system]</span>
      <span id="typing"></span>
    </div>

    <div class="line">
      <span>[status]</span>
      <span id="status"></span>
    </div>

    <div id="controls" style="display:none; margin-top:30px;">

      <div class="muted" style="margin-bottom:20px;">
        > One encrypted package found for you.
      </div>

      <button class="button" id="decryptBtn">
        🔒
        <span>Decrypt Message</span>
        <div class="cursor"></div>
      </button>

      <div class="muted" style="margin-top:18px; opacity:0.5;">
        (or just click anywhere)
      </div>

    </div>
  </div>

  <div class="reveal" id="reveal">

    <canvas id="heart"></canvas>

    <div class="title">
     <!-- <h1>Decrypted</h1> -->
      <div class="line-small"></div>
      <button class="rebtn" id="backBtn">Re-encrypt</button>
    </div>

    <div class="hud left">
      <div>ln: 420</div>
      <div>id: 0xDEADBEEF</div>
      <div>type: organic_emotion</div>
    </div>

    <div class="hud right">
      heart_reveal // success
    </div>

  </div>
</div>

<script>

const typing = document.getElementById('typing');
const status = document.getElementById('status');
const controls = document.getElementById('controls');
const decryptBtn = document.getElementById('decryptBtn');
const consoleBox = document.getElementById('console');
const reveal = document.getElementById('reveal');
const backBtn = document.getElementById('backBtn');

const text = 'Initializing...';
let i = 0;

function typeWriter() {
  if (i < text.length) {
    typing.textContent += text.charAt(i);
    i++;
    setTimeout(typeWriter, 35);
  } else {
    setTimeout(() => {
      status.innerHTML = '<span class="green">READY</span>';
      controls.style.display = 'block';
    }, 500);
  }
}

setTimeout(typeWriter, 400);

function openHeart() {
  consoleBox.style.opacity = '0';

  setTimeout(() => {
    consoleBox.style.display = 'none';
    reveal.classList.add('active');
  }, 900);
}

function closeHeart() {
  reveal.classList.remove('active');

  setTimeout(() => {
    consoleBox.style.display = 'block';
    consoleBox.style.opacity = '1';
  }, 500);
}

window.addEventListener('click', () => {
  if (controls.style.display === 'block') {
    openHeart();
  }
});

backBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  closeHeart();
});


decryptBtn.addEventListener('click', (e) => {
  e.stopPropagation();
  openHeart();
});


const canvas = document.getElementById('heart');
const ctx = canvas.getContext('2d');

let points = [];

function resize() {
  canvas.width = innerWidth;
  canvas.height = innerHeight;
  createHeart();
}

window.addEventListener('resize', resize);
resize();

function createHeart() {
  points = [];

  const centerX = canvas.width / 2;
  const centerY = canvas.height / 2;
  const scale = Math.min(canvas.width, canvas.height) / 42;

  for (let layer = 1; layer >= 0.2; layer -= 0.2) {

    for (let t = 0; t < Math.PI * 2; t += 0.05) {

      const x = 16 * Math.pow(Math.sin(t), 3);

      const y = -(
        13 * Math.cos(t)
        - 5 * Math.cos(2 * t)
        - 2 * Math.cos(3 * t)
        - Math.cos(4 * t)
      );

      points.push({
        x: centerX + x * scale * layer,
        y: centerY + y * scale * layer,
        alpha: 0,
        target: 0.3 + Math.random() * 0.7,
        delay: Math.random() * 7000,
        offset: Math.random() * Math.PI * 2
      });
    }
  }
}

function animate(time) {

  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.font = '14px Fira Code';

  points.forEach((p) => {

    if (time > p.delay) {
      p.alpha += (p.target - p.alpha) * 0.008;
    }

    const pulse = Math.sin(time * 0.0015 + p.offset) * 0.15;

    const red = 255;
    const green = 20 + Math.sin(time * 0.001 + p.offset) * 20;
    const blue = 40;

    ctx.fillStyle = `rgba(${red},${green},${blue},${Math.max(0.15, p.alpha + pulse)})`;

    ctx.fillText(
      'i love you',
      p.x,
      p.y + Math.sin(time * 0.001 + p.offset) * 4
    );
  });

  requestAnimationFrame(animate);
}

requestAnimationFrame(animate);

</script>

</body>
</html>
